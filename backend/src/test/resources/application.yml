spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    show-sql: false

gitlab:
  api:
    base-url: https://gitlab.com

ai:
  summary:
    enabled: false

jwt:
  secret: test-secret-key-min-32-chars-for-testing!!
  access-token-expiry: 3600
  refresh-token-expiry: 604800

CONFLUENCE_TOKEN_SECRET: vfsiY9pQWTTZIvg1b5Ely+21rybhMfKaoKf19n0g3ys=

keycloak:
  server-url: http://localhost:9999
  realm: test-realm
  client-id: test-client
  client-secret: test-secret
  oauth-state-cookie: test_oauth_state
  session-id-token-key: test_id_token
  redirect-uri: http://localhost:8080/auth/callback
  post-logout-redirect-uri: http://localhost:8080/auth/login
  post-login-redirect-uri: /
  secure-cookie: false
  permit-all-paths:
    - /**
  auth-controller:
    enabled: false
  uri:
    login: /auth/login
    callback: /auth/callback
    logout: /auth/logout
    refresh: /auth/refresh

github:
  oauth:
    client-id: test-github-client
    client-secret: test-github-secret
    redirect-uri: http://localhost:8080/api/oauth/github/callback
    frontend-origin: http://localhost:3000
