spring:
  datasource:
    url: ${DB_URL}
    driver-class-name: org.mariadb.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul
  application:
    name: work-log-ai

server:
  port: 8080

gitlab:
  api:
    base-url: https://gitlab.com
  oauth:
    client-id: ${GITLAB_OAUTH_CLIENT_ID:your-client-id}
    client-secret: ${GITLAB_OAUTH_CLIENT_SECRET:your-client-secret}
    redirect-uri: ${GITLAB_OAUTH_REDIRECT_URI:http://localhost:8080/api/oauth/gitlab/callback}
    frontend-origin: ${FRONTEND_ORIGIN:http://localhost:3000}

ai:
  summary:
    enabled: true
    api-key: ${GEMINI_API_KEY:}
    model: gemini-2.5-flash

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-min-32-chars-!!}
  access-token-expiry: 3600
  refresh-token-expiry: 604800

confluence:
  base-url: ${CONFLUENCE_BASE_URL:https://hubilon-platform-dev-team.atlassian.net}
  user-email: ${CONFLUENCE_USER_EMAIL:}
  api-token: ${CONFLUENCE_API_TOKEN:}
  space-key: ${CONFLUENCE_SPACE_KEY:Y2yJ6hFKUNFK}
  parent-page-title: ${CONFLUENCE_PARENT_PAGE_TITLE:주간보고}
  parent-page-id: ${CONFLUENCE_PARENT_PAGE_ID:851969}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
