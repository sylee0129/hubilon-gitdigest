spring:
  datasource:
    url: ${DB_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 8
  application:
    name: work-log-ai

server:
  port: 8080

gitlab:
  api:
    base-url: https://gitlab.com
  oauth:
    client-id: ${GITLAB_OAUTH_CLIENT_ID:your-client-id}
    client-secret: ${GITLAB_OAUTH_CLIENT_SECRET:your-client-secret}
    redirect-uri: ${GITLAB_OAUTH_REDIRECT_URI:http://localhost:8080/api/oauth/gitlab/callback}
    frontend-origin: ${FRONTEND_ORIGIN:http://localhost:3000}

github:
  oauth:
    client-id: ${GITHUB_OAUTH_CLIENT_ID}
    client-secret: ${GITHUB_OAUTH_CLIENT_SECRET}
    redirect-uri: ${GITHUB_OAUTH_REDIRECT_URI:http://localhost:8080/api/oauth/github/callback}
    frontend-origin: ${FRONTEND_ORIGIN:http://localhost:3000}

ai:
  summary:
    enabled: true
    api-key: ${GEMINI_API_KEY:}
    model: gemini-2.5-flash

keycloak:
  server-url: ${KEYCLOAK_SERVER_URL:http://192.168.10.30:8080}
  realm: ${KEYCLOAK_REALM:hubilon_pd}
  client-id: ${KEYCLOAK_CLIENT_ID:hubilon-gitdigest-local}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:YUA90njSxvvdXq6crpJj58oiAnQHxe3j}
  oauth-state-cookie: my_oauth_state
  session-id-token-key: my_id_token
  redirect-uri: ${KEYCLOAK_REDIRECT_URI:http://localhost:8080/auth/callback}
  post-logout-redirect-uri: ${KEYCLOAK_POST_LOGOUT_REDIRECT_URI:http://localhost:8080/auth/login}
  post-login-redirect-uri: ${KEYCLOAK_POST_LOGIN_REDIRECT_URI:http://localhost:3000}
  secure-cookie: ${KEYCLOAK_SECURE_COOKIE:false}
  permit-all-paths:
    - /public/**
    - /health
    - /actuator/**
    - /swagger-ui/**
    - /api-docs/**
    - /swagger-ui.html
  auth-controller:
    enabled: true
  uri:
    login: /auth/login
    callback: /auth/callback
    logout: /auth/logout
    refresh: /auth/refresh

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

scheduler:
  weekly-report:
    enabled: false
    cron: "0 55 9 * * THU"
#    cron: "0 40 9 * * FRI"
