server:
  port: 8090

spring:
  datasource:
    url: jdbc:h2:file:./data/worklogai;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: Asia/Seoul

gitlab:
  oauth:
    redirect-uri: ${GITLAB_OAUTH_REDIRECT_URI:http://localhost:8090/api/oauth/gitlab/callback}
    frontend-origin: ${FRONTEND_ORIGIN:http://localhost:3300}
