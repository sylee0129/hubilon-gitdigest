server:
  port: 8090

spring:
  datasource:
    url: ${DB_URL}
    driver-class-name: org.mariadb.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: Asia/Seoul

gitlab:
  oauth:
    redirect-uri: ${GITLAB_OAUTH_REDIRECT_URI:http://192.168.10.30:8090/api/oauth/gitlab/callback}
    frontend-origin: ${FRONTEND_ORIGIN:http://192.168.10.30:3300}

ai:
  summary:
    enabled: true


scheduler:
  weekly-report:
    enabled: true
    cron: "0 0 19 * * THU"
