server:
  port: 8090

spring:
  datasource:
    url: ${DB_URL}
    driver-class-name: org.mariadb.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: Asia/Seoul

gitlab:
  oauth:
    redirect-uri: ${GITLAB_OAUTH_REDIRECT_URI:http://localhost:8090/api/oauth/gitlab/callback}
    frontend-origin: ${FRONTEND_ORIGIN:http://localhost:3300}

ai:
  summary:
    enabled: false

confluence:
  base-url: ${CONFLUENCE_BASE_URL:https://hubilon-platform-dev-team.atlassian.net}
  user-email: ${CONFLUENCE_USER_EMAIL:}
  api-token: ${CONFLUENCE_API_TOKEN:}
  space-key: ${CONFLUENCE_SPACE_KEY:Y2yJ6hFKUNFK}
  parent-page-title: ${CONFLUENCE_PARENT_PAGE_TITLE:주간보고}
  parent-page-id: ${CONFLUENCE_PARENT_PAGE_ID:851969}

scheduler:
  weekly-report:
    enabled: true
    cron: "0 0 19 * * THU"
